name: Deploy to Production

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          NODE_ENV: production

      # ── Railway ────────────────────────────────────────────────────────────
      # Uncomment this block and add RAILWAY_TOKEN to your GitHub secrets
      # to auto-deploy to Railway on every push to main.
      #
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: sehatsaathi

      # ── Render ────────────────────────────────────────────────────────────
      # Uncomment this block and add RENDER_DEPLOY_HOOK_URL to your GitHub
      # secrets to auto-deploy to Render on every push to main.
      #
