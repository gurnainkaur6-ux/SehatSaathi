name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Add permissions for deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run check

      - name: Build project
        run: npm run build
        env:
          # Use empty strings or placeholders if these aren't strictly needed for the static build
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/sehatsaathi' }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'ci-test-secret' }}
          NODE_ENV: production

      # --- NEW DEPLOYMENT STEPS ---
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Change 'dist' to 'build' or 'out' depending on your framework
          path: './dist' 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
